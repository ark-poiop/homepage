<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratch AI | 일상의 불편함을 AI로 해결합니다.</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --biz: #7c3aed;
      --biz-light: #f3f0ff;
      --life: #10b981;
      --life-light: #ecfdf5;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(250,250,250,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      height: 56px;
      display: flex; align-items: center;
      padding: 0 clamp(16px, 5vw, 80px);
    }
    .nav-inner {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      font-size: 14px; color: var(--text-secondary); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text-primary); }

    /* 햄버거 버튼 */
    .hamburger {
      display: none;
      flex-direction: column; justify-content: center; gap: 5px;
      width: 36px; height: 36px; background: none; border: none;
      cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text-primary); border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* 모바일 드로어 */
    .mobile-menu {
      display: none;
      position: fixed; top: 56px; left: 0; right: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 99;
      flex-direction: column;
      padding: 8px 0 16px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      padding: 12px clamp(16px, 5vw, 80px);
      font-size: 15px; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .mobile-menu a:hover { background: var(--bg); color: var(--text-primary); }

    /* SECTIONS — 전체 너비, 가변 패딩 */
    section {
      width: 100%;
      padding-left: clamp(16px, 5vw, 80px);
      padding-right: clamp(16px, 5vw, 80px);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding-top: 56px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-light); color: var(--accent);
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
      padding: 4px 10px; border-radius: 20px; margin-bottom: 24px;
      width: fit-content;
    }
    .hero-badge::before { content: "●"; font-size: 8px; }
    .hero h1 {
      font-size: clamp(32px, 5.5vw, 72px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.12;
      margin-bottom: 20px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--text-secondary);
      max-width: 560px; line-height: 1.75; margin-bottom: 36px;
    }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--text-primary); color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.78; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface); color: var(--text-primary);
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      border: 1px solid var(--border); transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: #aaa; }

    /* SECTION HEADER */
    .section-wrap { padding-top: 96px; padding-bottom: 64px; }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(22px, 3.5vw, 40px); font-weight: 800;
      letter-spacing: -0.8px; margin-bottom: 8px;
    }
    .section-desc {
      font-size: clamp(14px, 1.5vw, 16px); color: var(--text-secondary); margin-bottom: 40px;
    }

    /* CATEGORY FILTER */
    .category-filter {
      display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text-secondary);
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #aaa; color: var(--text-primary); }
    .filter-btn.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
    .filter-btn.active-biz { background: var(--biz); color: #fff; border-color: var(--biz); }
    .filter-btn.active-life { background: var(--life); color: #fff; border-color: var(--life); }

    .cat-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      padding: 2px 8px; border-radius: 10px; margin-bottom: 10px;
    }
    .cat-badge.biz { background: var(--biz-light); color: var(--biz); }
    .cat-badge.life { background: var(--life-light); color: var(--life); }

    /* PROJECTS GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
      gap: clamp(12px, 2vw, 20px);
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(16px, 2.5vw, 28px);
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      animation: cardIn 0.35s ease forwards;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .project-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .project-card:hover .project-title { color: var(--accent); }
    .project-emoji { font-size: 28px; margin-bottom: 14px; }
    .project-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; transition: color 0.2s; }
    .project-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 11px; font-weight: 600;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-secondary); padding: 3px 8px; border-radius: 4px;
    }
    .card-hint {
      font-size: 11px; color: var(--text-muted);
      margin-top: 14px; display: flex; align-items: center; gap: 4px;
    }

    /* SKILLS — 화면 너비에 따라 1~4열 */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr));
      gap: clamp(10px, 1.5vw, 16px);
    }
    .skill-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .skill-icon { font-size: 20px; flex-shrink: 0; }
    .skill-name { font-size: 14px; font-weight: 600; }
    .skill-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    /* ABOUT */
    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: start;
    }
    .about-text { font-size: clamp(14px, 1.5vw, 16px); color: var(--text-secondary); line-height: 1.85; }
    .about-text strong { color: var(--text-primary); }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item {
      display: flex; gap: 16px;
      padding-bottom: 28px;
      position: relative;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-left {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; width: 14px;
    }
    .timeline-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      margin-top: 4px;
    }
    .timeline-line {
      width: 1px; flex: 1;
      background: var(--border);
      margin-top: 6px;
    }
    .timeline-item:last-child .timeline-line { display: none; }
    .timeline-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .timeline-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    /* CONTACT */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: 12px;
    }
    .contact-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: var(--text-primary);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .contact-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .contact-icon {
      font-size: 20px; width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-radius: 8px;
    }
    .contact-label { font-size: 13px; color: var(--text-muted); }
    .contact-value { font-size: 15px; font-weight: 600; word-break: break-all; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px clamp(16px, 5vw, 80px);
      text-align: center;
      font-size: 13px; color: var(--text-muted);
    }

    /* DIVIDER */
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%; max-width: 520px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      animation: slideUp 0.2s ease;
      position: relative;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 28px 28px 0;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .modal-emoji { font-size: 36px; line-height: 1; margin-bottom: 10px; }
    .modal-title { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; }
    .modal-close {
      flex-shrink: 0; width: 32px; height: 32px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 50%; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); transition: background 0.15s;
      margin-top: 2px;
    }
    .modal-close:hover { background: var(--border); }

    .modal-body { padding: 16px 28px 28px; }
    .modal-desc {
      font-size: 15px; color: var(--text-secondary);
      line-height: 1.75; margin-bottom: 20px;
    }
    .modal-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
    }
    .modal-features {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
    }
    .modal-feature {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 14px; color: var(--text-secondary); line-height: 1.55;
    }
    .modal-feature::before {
      content: ""; flex-shrink: 0;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); margin-top: 6px;
    }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── 반응형 브레이크포인트 ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .about-content { grid-template-columns: 1fr; gap: 28px; }
      .section-wrap { padding-top: 72px; padding-bottom: 48px; }
    }

    @media (max-width: 480px) {
      .hero h1 { letter-spacing: -0.8px; }
      .hero-actions { flex-direction: column; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
      .section-wrap { padding-top: 56px; padding-bottom: 40px; }
    }
  </style>
</head>

    function Hero() {

            <h1>
              {lines[0]}<br />
              <span>{lines[1]}</span>

            <p>{PROFILE.bio.replace(/<[^>]+>/g, '')}</p>

              <a href="#contact" className="btn-secondary">연락하기</a>
            </div>
          </div>
        </section>
      );

    function Modal({ project, onClose }) {
      useEffect(() => {
        const handler = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);
      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      const catLabel = project.category === 'biz' ? '비즈니스' : '라이프스타일';
      const catClass = project.category === 'biz' ? 'biz' : 'life';

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div className="modal-emoji">{project.emoji}</div>
                <span className={`cat-badge ${catClass}`}>{catLabel}</span>
                <div className="modal-title">{project.title}</div>
              </div>
              <button className="modal-close" onClick={onClose} aria-label="닫기">✕</button>
            </div>
            <div className="modal-body">
              <p className="modal-desc">{project.detail}</p>
              <div className="modal-section-title">주요 기능</div>
              <div className="modal-features">
                {project.features.map((f, i) => (
                  <div className="modal-feature" key={i}>{f}</div>
                ))}
              </div>
              <div className="modal-section-title">기술 스택</div>
              <div className="modal-tags">
                {project.tags.map(t => <span className="tag" key={t}>{t}</span>)}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Projects() {

      const [filter, setFilter] = useState("all");

      const filtered = filter === "all" ? PROJECTS : PROJECTS.filter(p => p.category === filter);

      return (
        <section id="projects" className="section-wrap">
          <div className="section-label">Projects</div>
          <div className="section-title">만든 것들</div>
          <div className="section-desc">업무 현장의 반복 업무를 줄인 AI 자동화와, 일상에서 만든 개인 프로젝트를 함께 모았습니다.</div>

          <div className="category-filter">
            {CATEGORIES.map(c => {
              let cls = "filter-btn";
              if (filter === c.key) {
                if (c.key === "biz") cls += " active-biz";
                else if (c.key === "life") cls += " active-life";
                else cls += " active";
              }
              return (
                <button key={c.key} type="button" className={cls} onClick={() => setFilter(c.key)}>
                  {c.label}
                  {c.key !== "all" && (
                    <span style={{ marginLeft: 4, opacity: 0.7 }}>
                      {PROJECTS.filter(p => p.category === c.key).length}
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          <div className="projects-grid">
            {filtered.map((p, i) => (
              <div
                className="project-card"
                key={p.title}
                style={{ animationDelay: `${i * 0.06}s` }}
                onClick={() => setSelected(p)}
                role="button"
                tabIndex={0}
                onKeyDown={e => e.key === 'Enter' && setSelected(p)}
              >
                <span className={`cat-badge ${p.category === 'biz' ? 'biz' : 'life'}`}>
                  {p.category === 'biz' ? '비즈니스' : '라이프스타일'}

                <div className="project-emoji">{p.emoji}</div>
                <div className="project-title">{p.title}</div>
                <div className="project-desc">{p.desc}</div>
                <div className="project-tags">

              </div>
            ))}
          </div>
          {selected && <Modal project={selected} onClose={() => setSelected(null)} />}
        </section>
      );
