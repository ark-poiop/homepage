<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratch AI | 일상의 불편함을 AI로 해결합니다.</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(250,250,250,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      height: 56px;
      display: flex; align-items: center;
      padding: 0 clamp(16px, 5vw, 80px);
    }
    .nav-inner {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      font-size: 14px; color: var(--text-secondary); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text-primary); }

    /* 햄버거 버튼 */
    .hamburger {
      display: none;
      flex-direction: column; justify-content: center; gap: 5px;
      width: 36px; height: 36px; background: none; border: none;
      cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text-primary); border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* 모바일 드로어 */
    .mobile-menu {
      display: none;
      position: fixed; top: 56px; left: 0; right: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 99;
      flex-direction: column;
      padding: 8px 0 16px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      padding: 12px clamp(16px, 5vw, 80px);
      font-size: 15px; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .mobile-menu a:hover { background: var(--bg); color: var(--text-primary); }

    /* SECTIONS — 전체 너비, 가변 패딩 */
    section {
      width: 100%;
      padding-left: clamp(16px, 5vw, 80px);
      padding-right: clamp(16px, 5vw, 80px);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding-top: 56px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-light); color: var(--accent);
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
      padding: 4px 10px; border-radius: 20px; margin-bottom: 24px;
      width: fit-content;
    }
    .hero-badge::before { content: "●"; font-size: 8px; }
    .hero h1 {
      font-size: clamp(32px, 5.5vw, 72px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.12;
      margin-bottom: 20px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--text-secondary);
      max-width: 560px; line-height: 1.75; margin-bottom: 36px;
    }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--text-primary); color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.78; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface); color: var(--text-primary);
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      border: 1px solid var(--border); transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: #aaa; }

    /* SECTION HEADER */
    .section-wrap { padding-top: 96px; padding-bottom: 64px; }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(22px, 3.5vw, 40px); font-weight: 800;
      letter-spacing: -0.8px; margin-bottom: 8px;
    }
    .section-desc {
      font-size: clamp(14px, 1.5vw, 16px); color: var(--text-secondary); margin-bottom: 40px;
    }

    /* PROJECTS GRID — 화면 너비에 따라 1~3열 */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
      gap: clamp(12px, 2vw, 20px);
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(16px, 2.5vw, 28px);
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: default;
    }
    .project-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .project-emoji { font-size: 28px; margin-bottom: 14px; }
    .project-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .project-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 11px; font-weight: 600;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-secondary); padding: 3px 8px; border-radius: 4px;
    }

    /* SKILLS — 화면 너비에 따라 1~4열 */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr));
      gap: clamp(10px, 1.5vw, 16px);
    }
    .skill-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .skill-icon { font-size: 20px; flex-shrink: 0; }
    .skill-name { font-size: 14px; font-weight: 600; }
    .skill-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    /* ABOUT */
    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: start;
    }
    .about-text { font-size: clamp(14px, 1.5vw, 16px); color: var(--text-secondary); line-height: 1.85; }
    .about-text strong { color: var(--text-primary); }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item {
      display: flex; gap: 16px;
      padding-bottom: 28px;
      position: relative;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-left {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; width: 14px;
    }
    .timeline-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      margin-top: 4px;
    }
    .timeline-line {
      width: 1px; flex: 1;
      background: var(--border);
      margin-top: 6px;
    }
    .timeline-item:last-child .timeline-line { display: none; }
    .timeline-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .timeline-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    /* CONTACT */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: 12px;
    }
    .contact-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: var(--text-primary);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .contact-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .contact-icon {
      font-size: 20px; width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-radius: 8px;
    }
    .contact-label { font-size: 13px; color: var(--text-muted); }
    .contact-value { font-size: 15px; font-weight: 600; word-break: break-all; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px clamp(16px, 5vw, 80px);
      text-align: center;
      font-size: 13px; color: var(--text-muted);
    }

    /* DIVIDER */
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* PROJECT CARD — 클릭 가능 */
    .project-card { cursor: pointer; }
    .project-card:hover .project-title { color: var(--accent); }
    .card-hint {
      font-size: 11px; color: var(--text-muted);
      margin-top: 14px; display: flex; align-items: center; gap: 4px;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%; max-width: 520px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      animation: slideUp 0.2s ease;
      position: relative;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 28px 28px 0;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .modal-emoji { font-size: 36px; line-height: 1; margin-bottom: 10px; }
    .modal-title { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; }
    .modal-close {
      flex-shrink: 0; width: 32px; height: 32px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 50%; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); transition: background 0.15s;
      margin-top: 2px;
    }
    .modal-close:hover { background: var(--border); }

    .modal-body { padding: 16px 28px 28px; }
    .modal-desc {
      font-size: 15px; color: var(--text-secondary);
      line-height: 1.75; margin-bottom: 20px;
    }
    .modal-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
    }
    .modal-features {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
    }
    .modal-feature {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 14px; color: var(--text-secondary); line-height: 1.55;
    }
    .modal-feature::before {
      content: ""; flex-shrink: 0;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); margin-top: 6px;
    }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── 반응형 브레이크포인트 ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .about-content { grid-template-columns: 1fr; gap: 28px; }
      .section-wrap { padding-top: 72px; padding-bottom: 48px; }
    }

    @media (max-width: 480px) {
      .hero h1 { letter-spacing: -0.8px; }
      .hero-actions { flex-direction: column; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
      .section-wrap { padding-top: 56px; padding-bottom: 40px; }
    }
  </style>
</head>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── 데이터 ─────────────────────────────────────────── */

    const TIMELINE = [

        title: "Raspberry Pi 홈서버 구축",

    /* ── 컴포넌트 ─────────────────────────────────────────── */
    function Nav() {
      const [open, setOpen] = React.useState(false);
      const close = () => setOpen(false);
      return (
        <>
          <nav>
            <div className="nav-inner">
              <div className="nav-logo">{PROFILE.name}</div>
              <div className="nav-links">

    function Hero() {
      const lines = PROFILE.tagline.split("\n");
      return (
        <section>

              <a href="#contact" className="btn-secondary">연락하기</a>
            </div>
          </div>
        </section>
      );
    }

    function Modal({ project, onClose }) {
      // ESC 키로 닫기
      React.useEffect(() => {
        const handler = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);
      // 스크롤 잠금
      React.useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div className="modal-emoji">{project.emoji}</div>
                <div className="modal-title">{project.title}</div>
              </div>
              <button className="modal-close" onClick={onClose} aria-label="닫기">✕</button>
            </div>
            <div className="modal-body">
              <p className="modal-desc">{project.detail}</p>
              <div className="modal-section-title">주요 기능</div>
              <div className="modal-features">
                {project.features.map((f, i) => (
                  <div className="modal-feature" key={i}>{f}</div>
                ))}
              </div>
              <div className="modal-section-title">기술 스택</div>
              <div className="modal-tags">
                {project.tags.map(t => <span className="tag" key={t}>{t}</span>)}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Projects() {
      const [selected, setSelected] = React.useState(null);
      return (
        <section id="projects" className="section-wrap">
          <div className="section-label">Projects</div>
          <div className="section-title">만든 것들</div>
          <div className="section-desc">일상의 불편함에서 출발한 AI 솔루션들입니다.</div>
          <div className="projects-grid">
            {PROJECTS.map((p, i) => (
              <div className="project-card" key={i} onClick={() => setSelected(p)} role="button" tabIndex={0}
                onKeyDown={e => e.key === 'Enter' && setSelected(p)}>
                <div className="project-emoji">{p.emoji}</div>
                <div className="project-title">{p.title}</div>
                <div className="project-desc">{p.desc}</div>
                <div className="project-tags">
                  {p.tags.map(t => <span className="tag" key={t}>{t}</span>)}
                </div>
                <div className="card-hint">↗ 자세히 보기</div>
              </div>
            ))}
          </div>
          {selected && <Modal project={selected} onClose={() => setSelected(null)} />}
        </section>
      );
    }

    function Skills() {
      return (
        <section id="skills" className="section-wrap">
          <hr className="divider" style={{marginBottom: '96px', marginTop: '-64px'}} />
          <div className="section-label">Skills</div>
          <div className="section-title">잘하는 것들</div>
          <div className="section-desc">기술보다 문제 해결에 집중합니다.</div>
          <div className="skills-grid">
            {SKILLS.map((s, i) => (
              <div className="skill-card" key={i}>
                <div className="skill-icon">{s.icon}</div>
                <div>
                  <div className="skill-name">{s.name}</div>
                  <div className="skill-sub">{s.sub}</div>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function About() {
      return (
        <section id="about" className="section-wrap">
          <hr className="divider" style={{marginBottom: '96px', marginTop: '-64px'}} />
          <div className="section-label">About</div>
          <div className="section-title">저는 이런 사람입니다</div>
          <div className="about-content">
            <div className="about-text">
              <p style={{marginBottom: '16px'}}>
                "생활 속 불편함을 AI로 해결하자" 라는 모토에서 프로젝트가 시작됩니다.
                <br /><br />
                <strong>바이브코딩</strong>은 코드를 완벽하게 알지 않아도 AI의 도움으로
                아이디어를 빠르게 구현합니다.<br />저는 생활 속 불편함을 기획력과 AI를 결합해
                실제로 쓰이는 도구를 만듭니다.
                <br /><br />
                기술이 어렵다고 느끼는 사람들도 AI 덕분에 자신의 문제를 직접 해결할 수
                있다고 믿습니다.
              </p>
            </div>
            <div className="timeline">
              {TIMELINE.map((t, i) => (
                <div className="timeline-item" key={i}>
                  <div className="timeline-left">
                    <div className="timeline-dot" />
                    <div className="timeline-line" />
                  </div>
                  <div>
                    <div className="timeline-title">{t.title}</div>
                    <div className="timeline-desc">{t.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Contact() {
      return (
        <section id="contact" className="section-wrap">
          <hr className="divider" style={{marginBottom: '96px', marginTop: '-64px'}} />
          <div className="section-label">Contact</div>
          <div className="section-title">같이 만들어요</div>
          <div className="section-desc">불편한 것이 있다면 언제든 이야기해 주세요.</div>
          <div className="contact-grid">
            <a className="contact-card" href={`mailto:${PROFILE.email}`}>
              <div className="contact-icon">📧</div>
              <div>
                <div className="contact-label">이메일</div>
                <div className="contact-value">{PROFILE.email}</div>
              </div>
            </a>
            <a className="contact-card" href={`https://${PROFILE.github}`} target="_blank" rel="noreferrer">
              <div className="contact-icon">🐙</div>
              <div>
                <div className="contact-label">GitHub</div>
                <div className="contact-value">{PROFILE.github}</div>
              </div>
            </a>
            <a className="contact-card" href={`https://${PROFILE.blog}`} target="_blank" rel="noreferrer">
              <div className="contact-icon">✍️</div>
              <div>
                <div className="contact-label">블로그</div>
                <div className="contact-value">{PROFILE.blog}</div>
              </div>
            </a>
            <a className="contact-card" href={`https://www.threads.net/${PROFILE.threads}`} target="_blank" rel="noreferrer">
              <div className="contact-icon">
                <svg width="18" height="18" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M141.537 88.988a66.667 66.667 0 0 0-2.518-1.143c-1.482-27.307-16.403-42.94-41.457-43.1h-.34c-14.986 0-27.449 6.396-35.12 18.036l13.779 9.452c5.73-8.695 14.724-10.548 21.348-10.548h.229c8.249.053 14.474 2.452 18.503 7.129 2.932 3.405 4.893 8.111 5.864 14.05-7.314-1.243-15.224-1.626-23.68-1.14-23.82 1.371-39.134 15.264-38.105 34.568.522 9.792 5.4 18.216 13.735 23.719 7.047 4.652 16.124 6.927 25.557 6.412 12.458-.683 22.231-5.436 29.049-14.127 5.178-6.6 8.453-15.153 9.899-25.93 5.937 3.583 10.337 8.298 12.767 13.966 4.132 9.635 4.373 25.468-8.546 38.376C93.474 160.244 74.899 167 52.33 167.11c-25.082-.122-44.057-8.232-56.398-24.102C-14.696 128.35-20.858 109.48-21 85.56c.142-23.919 6.304-42.788 16.332-57.448C7.673 12.242 26.648 4.132 51.73 4.01c25.292.124 44.502 8.278 57.105 24.235 6.204 7.866 10.88 17.892 13.93 29.76l16.247-4.333c-3.7-14.016-9.495-26.277-17.386-36.49C105.66 2.047 82.143-7.01 51.8-7.148h-.12C21.28-7.01-2.51 2.217-17.748 21.19-31.28 38.227-38.342 62.29-38.5 85.474v.172c.158 23.183 7.22 47.247 20.752 64.283C-2.51 168.903 21.28 178.13 51.68 178.268h.12c27.282-.126 46.6-7.726 62.444-24.354 20.502-21.47 19.839-48.035 13.093-64.42-4.853-11.31-14.163-20.531-25.8-26.506ZM96.868 125.4c-5.428.315-11.074-.82-15.464-3.683-3.478-2.293-5.411-5.52-5.57-9.108-.368-8.325 6.147-12.525 11.364-12.83 8.844-.51 18.066 1.896 25.41 6.864-1.815 10.898-8.117 18.221-15.74 18.757Z" fill="currentColor"/>
                </svg>
              </div>
              <div>
                <div className="contact-label">Threads</div>
                <div className="contact-value">{PROFILE.threads}</div>
              </div>
            </a>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer>
          <p>© 2026 {PROFILE.name}. 일상의 불편함을 AI로 해결합니다.</p>
        </footer>
      );
    }

    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <Projects />
          <Skills />
          <About />
          <Contact />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
